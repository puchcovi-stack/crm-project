{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход | БАЗА Золотая середина</title>
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-top: 4px solid #D7B56D; 
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            background: white;
            padding: 2rem;
        }
        .btn-gold {
            background-color: #D7B56D;
            color: #000;
            font-weight: bold;
            border: none;
            transition: all 0.2s ease;
        }
        .btn-gold:hover {
            background-color: #212529;
            color: #D7B56D;
        }
        .form-control:focus {
            border-color: #D7B56D;
            box-shadow: 0 0 0 0.25rem rgba(215, 181, 109, 0.25);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <img src="{% static 'img/logo.png' %}" alt="Логотип" style="width: 140px; height: 140px; object-fit: contain; margin-bottom: 5px;">
            <p class="text-muted small mt-2">Доступ только для сотрудников</p>
        </div>

        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label text-muted fw-bold small" style="letter-spacing: 1px;">ЛОГИН</label>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="Введите логин" required autofocus>
            </div>
            
            <div class="mb-4">
                <label class="form-label text-muted fw-bold small" style="letter-spacing: 1px;">ПАРОЛЬ</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="Введите пароль" required>
            </div>
            
            <button type="submit" class="btn btn-gold w-100 py-2" style="font-size: 0.9rem; letter-spacing: 1px;">ВОЙТИ В СИСТЕМУ</button>
            
            {% if form.errors %}
                <div class="text-danger text-center small fw-bold mt-3">
                    Неверный логин или пароль.
                </div>
            {% endif %}
        </form>
    </div>

</body>
</html>
